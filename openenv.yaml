id: scam-detection-env
name: Scam Detection RL Environment

description: Multi-level scam detection with difficulty levels

entrypoint: env:ScamEnv

tasks:
  - id: easy
    description: Detect obvious scams
    grader:
      type: rule
      field: action
      equals: scam

  - id: medium
    description: Detect moderate scams
    grader:
      type: rule
      field: action
      equals: scam

  - id: hard
    description: Detect advanced scams
    grader:
      type: rule
      field: action
      equals: scam

observation_space:
  type: object
  properties:
    text:
      type: string
    has_link:
      type: boolean
    has_urgent_words:
      type: boolean

action_space:
  type: string
  enum: ["scam", "safe"]

max_steps: 6