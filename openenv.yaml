id: scam-detection-env
name: Scam Detection RL Environment

entrypoint: env:ScamEnv

tasks:
  - id: easy
    description: Easy scam detection
    grader:
      type: rule
      field: action
      operator: equals_field
      target_field: actual

  - id: medium
    description: Medium scam detection
    grader:
      type: rule
      field: action
      operator: equals_field
      target_field: actual

  - id: hard
    description: Hard scam detection
    grader:
      type: rule
      field: action
      operator: equals_field
      target_field: actual

observation_space:
  type: object
  properties:
    text:
      type: string
    task:
      type: string   # 🔥 add this (important)

action_space:
  type: string
  enum: ["scam", "safe"]

max_steps: 6