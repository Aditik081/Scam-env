id: scam-detection-env
name: Scam Detection RL Environment

description: Multi-task scam detection (scam, phishing, spam)

entrypoint: env:ScamEnv

tasks:
  - id: scam_detection
    description: Detect general scams
    grader:
      type: match

  - id: phishing_detection
    description: Detect phishing messages
    grader:
      type: match

  - id: spam_detection
    description: Detect spam/fraud messages
    grader:
      type: match

observation_space:
  type: object
  properties:
    text:
      type: string
    task:
      type: string

action_space:
  type: string
  enum: ["scam", "safe"]

max_steps: 6