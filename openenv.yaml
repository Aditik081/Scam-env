id: scam-detection-env
name: Scam Detection RL Environment

entrypoint: env:ScamEnv

tasks:
  - id: easy
    description: Easy scam detection
    grader: grader:easy_grader

  - id: medium
    description: Medium scam detection
    grader: grader:medium_grader

  - id: hard
    description: Hard scam detection
    grader: grader:hard_grader
    

observation_space:
  type: object
  properties:
    text:
      type: string
    task:
      type: string   # 🔥 add this (important)

action_space:
  type: string
  enum: ["scam", "safe"]

max_steps: 6